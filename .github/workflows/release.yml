name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  pypi-release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Verify Version Consistency
        run: |
          PYTHON_VERSION=$(python -c 'from sutra_cli.main import VERSION; print(f"v{VERSION}")')
          TAG_VERSION=${{ github.ref_name }}
          if [ "$PYTHON_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Version in sutra_cli/main.py ($PYTHON_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-binaries:
    name: Build Standalone Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name sutra sutra_cli/main.py
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sutra-${{ matrix.os }}
          path: dist/sutra*

  create-release:
    name: Create GitHub Release
    needs: [pypi-release, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sutra-ubuntu-latest/sutra
            artifacts/sutra-macos-latest/sutra
            artifacts/sutra-windows-latest/sutra.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
